<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Table — The House</title>
  <link rel="stylesheet" href="/static/base.css">
  <style>
    .table-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 20px;
      flex-wrap: wrap;
      margin-bottom: 36px;
    }

    .header-actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
    }

    .two-col {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }

    @media (max-width: 700px) {
      .two-col { grid-template-columns: 1fr; }
    }

    .section-head {
      font-family: 'Cinzel', serif;
      font-size: 0.62rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 14px;
      padding-bottom: 10px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .player-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 0;
      border-bottom: 1px solid rgba(201,168,76,0.07);
    }
    .player-row:last-child { border-bottom: none; }

    .player-name {
      font-family: 'Cinzel', serif;
      font-size: 0.88rem;
      color: var(--cream);
      letter-spacing: 0.04em;
    }

    .player-actions { display: flex; gap: 8px; align-items: center; }

    .bet-amount {
      font-family: 'Cinzel', serif;
      font-size: 0.8rem;
      color: var(--gold);
      margin-right: 8px;
    }

    .queue-pos-num {
      font-family: 'Cinzel', serif;
      font-size: 0.75rem;
      color: var(--muted);
      width: 28px;
      flex-shrink: 0;
    }

    .empty-state {
      font-style: italic;
      color: var(--muted);
      font-size: 0.9rem;
      padding: 20px 0;
    }

    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(5,12,8,0.88);
      z-index: 200;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(4px);
    }
    .modal-overlay.open { display: flex; }

    .modal {
      background: var(--felt-mid);
      border: 1px solid var(--border-mid);
      border-radius: 4px;
      padding: 36px 32px;
      width: 100%;
      max-width: 520px;
      box-shadow: 0 32px 80px rgba(0,0,0,0.7);
      animation: fadeUp 0.3s ease both;
      position: relative;
    }

    .modal::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
    }

    .modal-title {
      font-family: 'Cinzel', serif;
      font-size: 1.15rem;
      font-weight: 700;
      color: var(--cream);
      margin-bottom: 20px;
    }

    .result-row {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 12px;
    }

    .result-name {
      font-family: 'Cinzel', serif;
      font-size: 0.8rem;
      color: var(--muted);
      width: 140px;
      flex-shrink: 0;
    }

    .result-input { flex: 1; }

    .modal-actions { display: flex; gap: 10px; margin-top: 24px; }
  </style>
</head>
<body>
  <nav>
    <a href="/tables" class="nav-brand">◆ The House</a>
    <ul class="nav-links">
      <li><a href="/tables">All Tables</a></li>
      <li><a href="/logout">Logout</a></li>
    </ul>
  </nav>

  <div class="page-wide">
    <div class="table-header animate-in">
      <div>
        <h1 class="page-title" id="tableTitle">Table</h1>
        <p class="page-subtitle">Live queue and active players</p>
      </div>
      <div class="header-actions">
        <button class="btn btn-outline btn-sm" onclick="pullPlayers()">Pull Players</button>
        <button class="btn btn-outline btn-sm" onclick="configureTable()">Configure</button>
        <button class="btn btn-outline btn-sm" onclick="startGame()">Start Game</button>
        <button class="btn btn-gold btn-sm" onclick="openEndGame()">End Game</button>
        <button class="btn btn-danger btn-sm" onclick="flushTable()">Flush Table</button>
      </div>
    </div>

    <div class="two-col animate-in stagger-2">
      <div class="card">
        <div class="section-head">
          <span>♠ Queue</span>
          <span id="queueCount" style="color:var(--muted);font-size:0.6rem;"></span>
        </div>
        <div id="queueList">
          <p class="empty-state">Loading...</p>
        </div>
      </div>

      <div class="card">
        <div class="section-head">
          <span>♦ Active Players</span>
          <span id="playerCount" style="color:var(--muted);font-size:0.6rem;"></span>
        </div>
        <div id="playerList">
          <p class="empty-state">Loading...</p>
        </div>
      </div>
    </div>

    <div style="margin-top:24px;">
      <a href="/tables" class="btn btn-outline btn-sm">← All Tables</a>
    </div>
  </div>

  <!-- End Game Modal -->
  <div class="modal-overlay" id="endGameModal">
    <div class="modal">
      <h2 class="modal-title">End Game — Submit Results</h2>
      <p style="font-size:0.9rem; color:var(--muted); font-style:italic; margin-bottom:20px;">Enter final credit amount for each player</p>
      <div id="resultFields"></div>
      <div class="modal-actions">
        <button class="btn btn-gold" onclick="submitEndGame()">Submit Results</button>
        <button class="btn btn-outline" onclick="document.getElementById('endGameModal').classList.remove('open')">Cancel</button>
      </div>
    </div>
  </div>

  <script>
    const tableId = window.location.pathname.split('/')[2];
    document.getElementById('tableTitle').textContent = `Table ${tableId}`;

    let activePlayers = {};

    const serverQueue   = {{ details.queue | tojson }};
    const serverPlayers = {{ details.players | tojson }};

    function renderQueue(queue) {
      const list = document.getElementById('queueList');
      const keys = Object.keys(queue);
      document.getElementById('queueCount').textContent = `${keys.length} waiting`;
      if (keys.length === 0) {
        list.innerHTML = '<p class="empty-state">Queue is empty</p>';
        return;
      }
      list.innerHTML = keys.map(pos => `
        <div class="player-row">
          <span class="queue-pos-num">#${pos}</span>
          <span class="player-name">${queue[pos]}</span>
          <div class="player-actions">
            <button class="btn btn-danger btn-sm" onclick="removeFromQueue('${queue[pos]}')">Remove</button>
          </div>
        </div>
      `).join('');
    }

    function renderPlayers(players) {
      const list = document.getElementById('playerList');
      const keys = Object.keys(players);
      document.getElementById('playerCount').textContent = `${keys.length} seated`;
      activePlayers = players;
      if (keys.length === 0) {
        list.innerHTML = '<p class="empty-state">No active players</p>';
        return;
      }
      list.innerHTML = keys.map(name => `
        <div class="player-row">
          <span class="player-name">${name}</span>
          <div class="player-actions">
            <span class="bet-amount">${players[name]} cr</span>
            <button class="btn btn-danger btn-sm" onclick="removeFromGame('${name}')">Remove</button>
          </div>
        </div>
      `).join('');
    }

    renderQueue(serverQueue);
    renderPlayers(serverPlayers);

    async function softRefresh() {
      try {
        const res = await fetch(`/table/${tableId}/data`);
        if (!res.ok) return;
        const data = await res.json();
        renderQueue(data.queue);
        renderPlayers(data.players);
      } catch (e) {
        // skip silently
      }
    }

    setInterval(softRefresh, 8000);

    async function pullPlayers() {
      await fetch(`/table/${tableId}/pull`);
      location.reload();
    }

    function configureTable() {
      window.location.href = `/table/${tableId}/configure`;
    }

    async function startGame() {
      await fetch(`/table/${tableId}/start`, { method: 'POST' });
      location.reload();
    }

    async function flushTable() {
      if (!confirm('Flush all active players from this table?')) return;
      await fetch(`/table/${tableId}/flush`);
      location.reload();
    }

    async function removeFromQueue(username) {
      await fetch(`/table/${tableId}/queue?removePlayer=${encodeURIComponent(username)}`);
      location.reload();
    }

    async function removeFromGame(username) {
      await fetch(`/table/${tableId}/remove?removePlayer=${encodeURIComponent(username)}`);
      location.reload();
    }

    function openEndGame() {
      const fields = document.getElementById('resultFields');
      const players = Object.keys(activePlayers);
      if (players.length === 0) {
        alert('No active players at this table.');
        return;
      }
      fields.innerHTML = players.map(name => `
        <div class="result-row">
          <span class="result-name">${name}</span>
          <input type="number" class="result-input" data-player="${name}"
                 placeholder="Final amount" min="0"
                 style="background:rgba(0,0,0,0.3);border:1px solid var(--border-mid);border-radius:3px;color:var(--cream);font-family:'Crimson Pro',serif;font-size:1rem;padding:8px 12px;outline:none;width:100%">
        </div>
      `).join('');
      document.getElementById('endGameModal').classList.add('open');
    }

    async function submitEndGame() {
      const inputs = document.querySelectorAll('#resultFields input');
      const results = {};
      for (const input of inputs) {
        const val = parseInt(input.value);
        if (isNaN(val) || val < 0) { alert(`Enter a valid amount for ${input.dataset.player}`); return; }
        results[input.dataset.player] = val;
      }
      const res = await fetch(`/table/${tableId}/end`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ tablenum: tableId, results })
      });
      if (res.ok) {
        document.getElementById('endGameModal').classList.remove('open');
        location.reload();
      }
    }
  </script>
</body>
</html>
