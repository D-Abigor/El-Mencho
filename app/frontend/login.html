<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In — The House</title>
  <link rel="stylesheet" href="/static/base.css">
  <style>
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 40px 20px;
    }

    .login-wrap {
      width: 100%;
      max-width: 420px;
      animation: fadeUp 0.6s ease both;
    }

    .login-header {
      text-align: center;
      margin-bottom: 40px;
    }

    .login-logo {
      font-family: 'Cinzel', serif;
      font-size: 0.65rem;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 16px;
      display: block;
    }

    .login-title {
      font-family: 'Cinzel', serif;
      font-size: 2rem;
      font-weight: 700;
      color: var(--cream);
      letter-spacing: 0.08em;
    }

    .login-card {
      background: var(--felt-mid);
      border: 1px solid var(--border-mid);
      border-radius: 4px;
      padding: 40px 36px;
      position: relative;
      box-shadow: 0 24px 80px rgba(0,0,0,0.6), 0 0 0 1px rgba(201,168,76,0.05);
    }

    .login-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
    }

    .corner-suit {
      position: absolute;
      font-size: 1.2rem;
      color: var(--gold);
      opacity: 0.2;
    }
    .corner-suit.tl { top: 12px; left: 14px; }
    .corner-suit.tr { top: 12px; right: 14px; }
    .corner-suit.bl { bottom: 12px; left: 14px; }
    .corner-suit.br { bottom: 12px; right: 14px; }

    .form-group { margin-bottom: 22px; }

    .btn-submit {
      width: 100%;
      margin-top: 8px;
      padding: 14px;
      font-size: 0.78rem;
    }

    .back-link {
      text-align: center;
      margin-top: 22px;
    }

    .back-link a {
      font-family: 'Cinzel', serif;
      font-size: 0.65rem;
      letter-spacing: 0.15em;
      color: var(--muted);
      text-decoration: none;
      text-transform: uppercase;
      transition: color 0.2s;
    }
    .back-link a:hover { color: var(--gold); }
  </style>
</head>
<body>
  <div class="login-wrap">
    <div class="login-header">
      <span class="login-logo">◆ El-Dinero ◆</span>
      <h1 class="login-title">Sign In</h1>
    </div>

    <div class="login-card">
      <span class="corner-suit tl">♠</span>
      <span class="corner-suit tr">♥</span>
      <span class="corner-suit bl">♣</span>
      <span class="corner-suit br">♦</span>

      <form method="POST" action="/login" id="loginForm">
        <div class="form-group">
          <label class="label" for="username">Username</label>
          <input type="text" id="username" name="username" placeholder="Enter your username" required autocomplete="username">
        </div>

        <div class="form-group">
          <label class="label" for="password">Password</label>
          <input type="password" id="password" name="password" placeholder="••••••••" required autocomplete="current-password">
        </div>

        <button type="submit" class="btn btn-gold btn-submit">Enter El-Dinero</button>
      </form>
    </div>

    <div class="back-link">
      <a href="/">← Back to lobby</a>
    </div>
  </div>

  <script>
    // Submit as JSON to match FastAPI model
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const res = await fetch('/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          username: document.getElementById('username').value,
          password: document.getElementById('password').value
        })
      });
      if (res.redirected) window.location.href = res.url;
    });
  </script>
</body>
</html>
