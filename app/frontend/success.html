<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The House — Done</title>
  <link rel="stylesheet" href="/static/base.css" />
  <style>
    body { display:flex; align-items:center; justify-content:center; min-height:100vh; }
    .ok-wrap { max-width:420px; width:100%; text-align:center; }
    .ok-icon { font-size:4rem; margin-bottom:1rem; display:block; color:var(--gold); opacity:0.7; }
    .ok-msg {
      background: rgba(22,163,74,0.15);
      border: 1px solid #16a34a;
      border-radius: var(--radius);
      color: #4ade80;
      padding: 1rem 1.25rem;
      margin: 1.25rem 0 2rem;
      font-size:0.95rem;
      line-height:1.5;
    }
  </style>
</head>
<body>
  <div class="ok-wrap fade-up">
    <span class="ok-icon">♦</span>
    <h2>Done</h2>
    <div class="ok-msg">{{ message }}</div>
    <div style="display:flex; gap:0.75rem; justify-content:center;">
      <a href="/home" class="btn btn-gold">Back to Home</a>
    </div>
  </div>
</body>
</html>
