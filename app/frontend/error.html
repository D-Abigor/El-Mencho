<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The House — Error</title>
  <link rel="stylesheet" href="/static/base.css" />
  <style>
    body { display:flex; align-items:center; justify-content:center; min-height:100vh; }
    .err-wrap { max-width:420px; width:100%; text-align:center; }
    .err-icon { font-size:4rem; margin-bottom:1rem; display:block; opacity:0.6; }
    .err-msg {
      background: rgba(184,19,42,0.15);
      border: 1px solid var(--red);
      border-radius: var(--radius);
      color: #ff8096;
      padding: 1rem 1.25rem;
      margin: 1.25rem 0 2rem;
      font-size:0.95rem;
      line-height:1.5;
    }
  </style>
</head>
<body>
  <div class="err-wrap fade-up">
    <span class="err-icon">♠</span>
    <h2 style="color:var(--red-bright);">Something Went Wrong</h2>
    <div class="err-msg">{{ message }}</div>
    <div style="display:flex; gap:0.75rem; justify-content:center;">
      <a href="/home" class="btn btn-outline">Home</a>
      <a href="javascript:history.back()" class="btn btn-ghost">Go Back</a>
    </div>
  </div>
</body>
</html>
