<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The House — Pay a Teammate</title>
  <link rel="stylesheet" href="/static/base.css" />
  <style>
    .payee-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 0.9rem;
      margin-top: 1.5rem;
    }
    .payee-card {
      background: rgba(0,0,0,0.4);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.1rem 1.25rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.75rem;
      cursor: pointer;
      text-decoration: none;
      transition: all 0.2s;
    }
    .payee-card:hover {
      border-color: var(--gold);
      background: rgba(201,168,76,0.07);
      box-shadow: var(--shadow-gold);
      transform: translateY(-2px);
    }
    .payee-name {
      font-family: 'Cinzel', serif;
      font-size: 0.9rem;
      color: var(--text-main);
      letter-spacing: 0.05em;
    }
    .payee-arrow { color: var(--gold); opacity: 0.5; font-size: 1.1rem; }
    .payee-card:hover .payee-arrow { opacity: 1; }
  </style>
</head>
<body>
  <nav>
    <a class="nav-brand" href="/">The <span>♠</span> House</a>
    <div class="nav-links">
      <a href="/home">Home</a>
      <a href="/play">Play</a>
      <a href="/logout">Leave</a>
    </div>
  </nav>

  <main class="page-md">
    <h1 class="fade-up" style="margin-bottom:0.4rem;">Send Credits</h1>
    <p class="fade-up fade-up-1" style="color:var(--text-muted); font-style:italic; margin-bottom:2rem;">
      Select a teammate to pay
    </p>

    {% if payees %}
      <div class="payee-grid fade-up fade-up-2">
        {% for payee in payees %}
          <a href="/pay?to={{ payee }}" class="payee-card">
            <span class="payee-name">{{ payee }}</span>
            <span class="payee-arrow">→</span>
          </a>
        {% endfor %}
      </div>
    {% else %}
      <div class="panel fade-up fade-up-2" style="text-align:center; color:var(--text-muted); font-style:italic;">
        No teammates found on your roster.
      </div>
    {% endif %}

    <div style="margin-top:2rem;" class="fade-up fade-up-3">
      <a href="/home" class="btn btn-ghost">← Back to Account</a>
    </div>
  </main>
</body>
</html>
