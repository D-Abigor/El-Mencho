<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Transfer Credits — The House</title>
  <link rel="stylesheet" href="/static/base.css">
  <style>
    .payee-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 14px;
      margin-top: 8px;
    }

    .payee-card {
      background: var(--felt-mid);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 20px 22px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      transition: border-color 0.2s, box-shadow 0.2s;
      text-decoration: none;
    }

    .payee-card:hover {
      border-color: var(--gold);
      box-shadow: 0 0 0 1px var(--gold-dim), 0 4px 16px rgba(0,0,0,0.3);
    }

    .payee-name {
      font-family: 'Cinzel', serif;
      font-size: 0.85rem;
      letter-spacing: 0.06em;
      color: var(--cream);
    }

    .payee-arrow {
      color: var(--gold);
      opacity: 0.4;
      font-size: 0.9rem;
      transition: opacity 0.2s, transform 0.2s;
    }
    .payee-card:hover .payee-arrow { opacity: 1; transform: translateX(3px); }

    .empty-state {
      font-style: italic;
      color: var(--muted);
      padding: 32px 0;
    }
  </style>
</head>
<body>
  <nav>
    <a href="/home" class="nav-brand">◆ The House</a>
    <ul class="nav-links">
      <li><a href="/play">Play</a></li>
      <li><a href="/payees">Transfer</a></li>
      <li><a href="/leaderBoard">Leaderboard</a></li>
      <li><a href="/logout">Logout</a></li>
    </ul>
  </nav>

  <div class="page">
    <h1 class="page-title animate-in">Transfer Credits</h1>
    <p class="page-subtitle animate-in stagger-1">Select a teammate to send credits to</p>

    {% if payees %}
      <div class="payee-grid">
        {% for payee in payees %}
          <a href="/pay?to={{ payee }}" class="payee-card animate-in stagger-{{ loop.index if loop.index <= 5 else 5 }}">
            <span class="payee-name">{{ payee }}</span>
            <span class="payee-arrow">→</span>
          </a>
        {% endfor %}
      </div>
    {% else %}
      <p class="empty-state">No teammates found on your team.</p>
    {% endif %}

    <div style="margin-top: 36px;">
      <a href="/home" class="btn btn-outline">← Back to Dashboard</a>
    </div>
  </div>
</body>
</html>
