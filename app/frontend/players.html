<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Players — The House</title>
<link rel="stylesheet" href="/static/base.css">
<style>
body {
  display: flex;
  flex-direction: column;
  align-items: center;
  min-height: 100vh;
  padding: 60px 20px;
}

.page-header {
  text-align: center;
  margin-bottom: 36px;
  animation: fadeUp 0.4s ease both;
}

.page-suit {
  font-size: 2.4rem;
  color: var(--gold, #c9a84c);
  opacity: 0.7;
  display: block;
  margin-bottom: 14px;
}

.page-title {
  font-family: 'Cinzel', serif;
  font-size: 1.8rem;
  font-weight: 700;
  color: var(--cream, #f5f0e8);
  letter-spacing: 0.12em;
  margin-bottom: 8px;
}

.page-subtitle {
  font-size: 0.9rem;
  color: var(--muted, #8a8070);
  letter-spacing: 0.06em;
  text-transform: uppercase;
}

.players-wrap {
  width: 100%;
  max-width: 560px;
  animation: fadeUp 0.5s ease 0.1s both;
}

.search-bar {
  width: 100%;
  background: rgba(0,0,0,0.3);
  border: 1px solid rgba(201,168,76,0.2);
  border-radius: 3px;
  padding: 11px 16px;
  color: var(--cream, #f5f0e8);
  font-size: 0.9rem;
  outline: none;
  box-sizing: border-box;
  margin-bottom: 12px;
  transition: border-color 0.2s, box-shadow 0.2s;
}

.search-bar::placeholder {
  color: rgba(138,128,112,0.5);
}

.search-bar:focus {
  border-color: rgba(201,168,76,0.45);
  box-shadow: 0 0 0 3px rgba(201,168,76,0.07);
}

.players-table {
  width: 100%;
  border-collapse: collapse;
  background: rgba(255,255,255,0.02);
  border: 1px solid rgba(201,168,76,0.18);
  border-radius: 4px;
  overflow: hidden;
}

.players-table thead tr {
  background: rgba(201,168,76,0.08);
  border-bottom: 1px solid rgba(201,168,76,0.2);
}

.players-table th {
  font-family: 'Cinzel', serif;
  font-size: 0.7rem;
  font-weight: 600;
  color: var(--gold, #c9a84c);
  letter-spacing: 0.14em;
  text-transform: uppercase;
  padding: 14px 24px;
  text-align: left;
}

.players-table td {
  padding: 14px 24px;
  color: var(--cream, #f5f0e8);
  font-size: 0.95rem;
  border-bottom: 1px solid rgba(255,255,255,0.05);
  vertical-align: middle;
}

.players-table tbody tr:last-child td {
  border-bottom: none;
}

.players-table tbody tr {
  transition: background 0.15s ease;
  cursor: pointer;
}

.players-table tbody tr:hover {
  background: rgba(201,168,76,0.06);
}

.player-index {
  color: var(--muted, #8a8070);
  font-size: 0.8rem;
  font-family: 'Cinzel', serif;
  width: 40px;
}

.player-name {
  font-weight: 500;
  letter-spacing: 0.03em;
}

.player-pip {
  display: inline-block;
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: var(--gold, #c9a84c);
  opacity: 0.5;
  margin-right: 10px;
  vertical-align: middle;
}

.empty-state {
  text-align: center;
  padding: 60px 24px;
  color: var(--muted, #8a8070);
  font-style: italic;
}

.no-results {
  display: none;
  text-align: center;
  padding: 40px 24px;
  color: var(--muted, #8a8070);
  font-style: italic;
  font-size: 0.9rem;
}

.actions {
  margin-top: 32px;
  display: flex;
  gap: 12px;
  justify-content: center;
  animation: fadeUp 0.5s ease 0.2s both;
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(16px); }
  to   { opacity: 1; transform: translateY(0); }
}
</style>
</head>
<body>

<div class="page-header">
  <span class="page-suit">♠</span>
  <h1 class="page-title">Active Players</h1>
  <p class="page-subtitle">All registered players at the table</p>
</div>

<div class="players-wrap">
  <input
    class="search-bar"
    id="search"
    type="text"
    placeholder="Search players…"
    oninput="filterPlayers()"
    autocomplete="off"
  />

  <table class="players-table">
    <thead>
      <tr>
        <th>#</th>
        <th>Username</th>
      </tr>
    </thead>
    <tbody id="playerBody">
      {% for player in players %}
      <tr onclick="window.location='/player/{{ player }}'">
        <td class="player-index">{{ loop.index }}</td>
        <td class="player-name"><span class="player-pip"></span>{{ player }}</td>
      </tr>
      {% else %}
      <tr>
        <td colspan="2" class="empty-state">No players at the table.</td>
      </tr>
      {% endfor %}
    </tbody>
  </table>

  <p class="no-results" id="noResults">No players match your search.</p>
</div>

<div class="actions">
  <a href="/home" class="btn btn-gold">Dashboard</a>
  <a href="/" class="btn btn-outline">Lobby</a>
</div>

<script>
  function filterPlayers() {
    const query = document.getElementById('search').value.toLowerCase();
    const rows = document.querySelectorAll('#playerBody tr');
    let visible = 0;

    rows.forEach(row => {
      const name = row.querySelector('.player-name');
      if (!name) return; // empty state row
      const match = name.textContent.toLowerCase().includes(query);
      row.style.display = match ? '' : 'none';
      if (match) visible++;
    });

    document.getElementById('noResults').style.display =
      visible === 0 && query !== '' ? 'block' : 'none';
  }
</script>

</body>
</html>
