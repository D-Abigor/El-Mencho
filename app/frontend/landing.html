<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The House</title>
  <link rel="stylesheet" href="/static/base.css">
  <style>
    html, body {
      overflow: hidden;
      max-width: 100%;
    }

    .hero {
      min-height: 100vh;
      min-height: 100dvh; /* dynamic viewport height for mobile browsers */
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      position: relative;
      padding: 40px;
      /* Clip anything that bleeds out */
      overflow: hidden;
    }

    /* Radial felt glow */
    .hero::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse 70% 50% at 50% 50%, rgba(201,168,76,0.07) 0%, transparent 65%),
        radial-gradient(ellipse 40% 30% at 50% 50%, rgba(13,33,23,0.0) 0%, rgba(5,12,8,0.7) 100%);
      pointer-events: none;
    }

    /* Corner suits — clipped inside .hero, scaled down on mobile */
    .suit {
      position: absolute;
      font-size: clamp(5rem, 18vw, 14rem); /* shrinks on small screens */
      opacity: 0.04;
      line-height: 1;
      pointer-events: none;
    }
    .suit-tl { top: -20px; left: -10px; transform: rotate(-15deg); }
    .suit-tr { top: -20px; right: -10px; transform: rotate(15deg); }
    .suit-bl { bottom: -20px; left: -10px; transform: rotate(15deg); }
    .suit-br { bottom: -20px; right: -10px; transform: rotate(-15deg); }

    /* Gold border frame */
    .hero-frame {
      position: absolute;
      inset: 16px; /* tighter on mobile */
      border: 1px solid var(--border);
      pointer-events: none;
    }
    .hero-frame::before, .hero-frame::after {
      content: '◆';
      position: absolute;
      color: var(--gold);
      font-size: 0.7rem;
    }
    .hero-frame::before { top: -8px; left: 50%; transform: translateX(-50%); }
    .hero-frame::after  { bottom: -8px; left: 50%; transform: translateX(-50%); }

    .hero-eyebrow {
      font-family: 'Cinzel', serif;
      font-size: 0.65rem;
      letter-spacing: 0.4em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 24px;
      animation: fadeUp 0.8s ease both;
    }

    .hero-title {
      font-family: 'Cinzel', serif;
      font-size: clamp(3.5rem, 8vw, 6.5rem);
      font-weight: 900;
      line-height: 0.95;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--cream);
      margin-bottom: 8px;
      animation: fadeUp 0.8s ease 0.1s both;
    }

    .hero-title span {
      display: block;
      background: linear-gradient(135deg, #c9a84c 0%, #f0dc8a 40%, #c9a84c 70%, #a07828 100%);
      background-size: 200% auto;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: fadeUp 0.8s ease 0.1s both, shimmer 4s linear 1s infinite;
    }

    .hero-sub {
      font-size: 1.15rem;
      font-style: italic;
      color: var(--muted);
      margin-bottom: 52px;
      animation: fadeUp 0.8s ease 0.2s both;
    }

    .hero-actions {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
      justify-content: center;
      animation: fadeUp 0.8s ease 0.3s both;
    }

    .btn-hero {
      font-family: 'Cinzel', serif;
      font-size: 0.75rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      padding: 16px 48px;
      border-radius: 3px;
      cursor: pointer;
      transition: all 0.25s;
      text-decoration: none;
      display: inline-block;
    }

    .btn-hero-primary {
      background: linear-gradient(135deg, #c9a84c, #e8c96a, #c9a84c);
      background-size: 200% auto;
      color: #1a0e00;
      font-weight: 700;
      box-shadow: 0 4px 24px rgba(201,168,76,0.35), 0 0 60px rgba(201,168,76,0.08);
      border: none;
    }
    .btn-hero-primary:hover {
      background-position: right center;
      box-shadow: 0 6px 32px rgba(201,168,76,0.55), 0 0 80px rgba(201,168,76,0.12);
      transform: translateY(-2px);
    }

    .btn-hero-ghost {
      background: transparent;
      border: 1px solid var(--border-mid);
      color: var(--gold);
    }
    .btn-hero-ghost:hover {
      border-color: var(--gold);
      background: var(--gold-dim);
      transform: translateY(-2px);
    }

    .games-strip {
      position: absolute;
      bottom: 40px;
      left: 0;
      right: 0;
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      justify-content: center;
      padding: 0 24px;
      animation: fadeUp 0.8s ease 0.5s both;
    }

    .game-pill {
      font-family: 'Cinzel', serif;
      font-size: 0.58rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--muted);
      padding: 6px 14px;
      border: 1px solid var(--border);
      border-radius: 20px;
      white-space: nowrap;
    }
  </style>
</head>
<body>
  <div class="hero">
    <div class="suit suit-tl">♠</div>
    <div class="suit suit-tr">♥</div>
    <div class="suit suit-bl">♣</div>
    <div class="suit suit-br">♦</div>
    <div class="hero-frame"></div>

    <p class="hero-eyebrow">◆ &nbsp; Welcome to the table &nbsp; ◆</p>
    <h1 class="hero-title"><span>El Dinero</span></h1>
    <p class="hero-sub">Where fortunes are made and legends are written</p>

    <div class="hero-actions">
      <a href="/login" class="btn-hero btn-hero-primary">Enter the Casino</a>
      <a href="/leaderBoard" class="btn-hero btn-hero-ghost">Leaderboard</a>
    </div>

    <div class="games-strip">
      <span class="game-pill">♠ Teen Patti</span>
      <span class="game-pill">♥ Poker</span>
      <span class="game-pill">♣ Blackjack</span>
      <span class="game-pill">♦ Rummy</span>
      <span class="game-pill">♠ Crazy 8s</span>
      <span class="game-pill">♥ 3 of Spades</span>
    </div>
  </div>
</body>
</html>
