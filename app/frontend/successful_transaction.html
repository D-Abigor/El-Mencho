<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Transfer Complete — The House</title>
  <link rel="stylesheet" href="/static/base.css">
  <style>
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 40px 20px;
    }

    .success-wrap {
      text-align: center;
      max-width: 420px;
      animation: fadeUp 0.6s ease both;
    }

    .success-icon {
      font-size: 3.5rem;
      color: var(--gold);
      margin-bottom: 24px;
      display: block;
      animation: fadeUp 0.4s ease both;
    }

    .success-title {
      font-family: 'Cinzel', serif;
      font-size: 1.8rem;
      font-weight: 700;
      color: var(--cream);
      letter-spacing: 0.1em;
      margin-bottom: 12px;
    }

    .success-message {
      font-size: 1.05rem;
      color: var(--muted);
      font-style: italic;
      margin-bottom: 40px;
      line-height: 1.7;
    }

    .success-actions {
      display: flex;
      gap: 12px;
      justify-content: center;
    }
  </style>
</head>
<body>
  <div class="success-wrap">
    <span class="success-icon">◆</span>
    <h1 class="success-title">Transfer Complete</h1>
    <p class="success-message">{{ message }}</p>
    <div class="success-actions">
      <a href="/home" class="btn btn-gold">Back to Dashboard</a>
      <a href="/payees" class="btn btn-outline">Send Again</a>
    </div>
  </div>
</body>
</html>
