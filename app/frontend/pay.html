<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The House — Transfer</title>
  <link rel="stylesheet" href="/static/base.css" />
  <style>
    .transfer-card {
      position: relative;
      overflow: hidden;
    }
    .transfer-card::before {
      content: '♦';
      position: absolute;
      font-size: 10rem;
      color: var(--red);
      opacity: 0.03;
      right: -2rem;
      top: -1.5rem;
      pointer-events: none;
    }
    .amount-hint {
      font-size: 0.85rem;
      color: var(--text-muted);
      font-style: italic;
      margin-top: 0.25rem;
    }
    .to-badge {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      background: rgba(201,168,76,0.1);
      border: 1px solid var(--gold);
      border-radius: 3rem;
      padding: 0.35rem 1rem;
      font-family: 'Cinzel', serif;
      font-size: 0.85rem;
      color: var(--gold);
      margin-bottom: 1.5rem;
    }
  </style>
</head>
<body>
  <nav>
    <a class="nav-brand" href="/">The <span>♠</span> House</a>
    <div class="nav-links">
      <a href="/home">Home</a>
      <a href="/play">Play</a>
      <a href="/logout">Leave</a>
    </div>
  </nav>

  <main class="page-sm">
    <h1 class="fade-up" style="margin-bottom:0.3rem;">Transfer Credits</h1>
    <p class="fade-up fade-up-1" style="color:var(--text-muted); font-style:italic; margin-bottom:2rem;">
      Move chips across the table
    </p>

    <div class="panel transfer-card fade-up fade-up-2">
      {% if recipient %}
        <div class="to-badge">
          <span>→</span>
          <span>{{ recipient }}</span>
        </div>
      {% endif %}

      <form id="payForm">
        <div class="form-group">
          <label for="recepient">Recipient</label>
          <input
            type="text"
            id="recepient"
            name="recepient"
            value="{{ recipient or '' }}"
            placeholder="username"
            required
          />
        </div>

        <div class="form-group">
          <label for="amount">Amount (credits)</label>
          <input
            type="number"
            id="amount"
            name="amount"
            min="1"
            placeholder="0"
            required
          />
          <span class="amount-hint">Whole numbers only</span>
        </div>

        <div style="display:flex; gap:0.75rem; margin-top:0.5rem;">
          <button type="submit" class="btn btn-gold" style="flex:1;">Send</button>
          <a href="/payees" class="btn btn-ghost">Cancel</a>
        </div>
      </form>

      <div id="feedback" style="display:none; margin-top:1rem;"></div>
    </div>
  </main>

  <script>
    document.getElementById('payForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = e.target.querySelector('button[type=submit]');
      btn.disabled = true; btn.textContent = 'Sending…';

      const payload = {
        recepient: document.getElementById('recepient').value,
        amount: parseInt(document.getElementById('amount').value),
      };

      const fb = document.getElementById('feedback');
      try {
        const res = await fetch('/transfer', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload),
        });
        if (res.ok) {
          fb.style.display = 'block';
          fb.className = 'alert alert-success';
          fb.textContent = `✓ ${payload.amount} credits sent to ${payload.recepient}`;
          e.target.reset();
          document.getElementById('recepient').value = payload.recepient;
        } else {
          const text = await res.text();
          fb.style.display = 'block';
          fb.className = 'alert alert-error';
          fb.textContent = '✗ Transfer failed. ' + (res.statusText || '');
        }
      } catch (err) {
        fb.style.display = 'block';
        fb.className = 'alert alert-error';
        fb.textContent = 'Network error. Please try again.';
      }
      btn.disabled = false; btn.textContent = 'Send';
    });
  </script>
</body>
</html>
