<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Send Credits — The House</title>
  <link rel="stylesheet" href="/static/base.css">
  <style>
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      flex-direction: column;
      gap: 32px;
      padding: 40px 20px;
    }

    .pay-card {
      width: 100%;
      max-width: 440px;
      background: var(--felt-mid);
      border: 1px solid var(--border-mid);
      border-radius: 4px;
      padding: 40px 36px;
      position: relative;
      box-shadow: 0 24px 80px rgba(0,0,0,0.5);
      animation: fadeUp 0.5s ease both;
    }

    .pay-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
    }

    .pay-title {
      font-family: 'Cinzel', serif;
      font-size: 1.4rem;
      font-weight: 700;
      color: var(--cream);
      letter-spacing: 0.08em;
      margin-bottom: 6px;
    }

    .pay-sub {
      font-size: 0.95rem;
      color: var(--muted);
      font-style: italic;
      margin-bottom: 30px;
    }

    .recipient-display {
      background: rgba(201,168,76,0.08);
      border: 1px solid var(--border-mid);
      border-radius: 3px;
      padding: 12px 16px;
      font-family: 'Cinzel', serif;
      font-size: 0.9rem;
      color: var(--gold);
      letter-spacing: 0.06em;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .recipient-display .suit { opacity: 0.5; }

    .btn-submit { width: 100%; padding: 14px; font-size: 0.78rem; margin-top: 8px; }

    .back-link {
      font-family: 'Cinzel', serif;
      font-size: 0.65rem;
      letter-spacing: 0.15em;
      color: var(--muted);
      text-decoration: none;
      text-transform: uppercase;
      transition: color 0.2s;
    }
    .back-link:hover { color: var(--gold); }
  </style>
</head>
<body>
  <div class="pay-card">
    <h1 class="pay-title">Send Credits</h1>
    <p class="pay-sub">Transfer funds to a teammate</p>

    <form id="payForm">
      <div class="form-group">
        <label class="label">Recipient</label>
        {% if recipient %}
          <div class="recipient-display">
            <span class="suit">◆</span>
            <span>{{ recipient }}</span>
          </div>
          <input type="hidden" name="recepient" id="recepient" value="{{ recipient }}">
        {% else %}
          <input type="text" name="recepient" id="recepient" placeholder="Username" required>
        {% endif %}
      </div>

      <div class="form-group">
        <label class="label" for="amount">Amount</label>
        <input type="number" id="amount" name="amount" placeholder="0" min="1" required>
      </div>

      <button type="submit" class="btn btn-gold btn-submit">Send Credits</button>
    </form>
  </div>

  <a href="/payees" class="back-link">← Choose a different recipient</a>

  <script>
    document.getElementById('payForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const res = await fetch('/transfer', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          recepient: document.getElementById('recepient').value,
          amount: parseInt(document.getElementById('amount').value)
        })
      });
      if (res.ok) {
        const html = await res.text();
        document.open(); document.write(html); document.close();
      }
    });
  </script>
</body>
</html>
